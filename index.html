<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>haum — brand playground</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#07141C;--panel:#0C1F2A;--line:#16323F;--text:#DDEFF2;--muted:#6E8B95;--signal:#2FE6D6;--accent:#18A7C4;--warn:#FF7A3C}
  html,body{background:var(--bg);color:var(--text)}
  body{font-family:-apple-system,"Segoe UI",system-ui,Roboto,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  .mono{font-family:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace}
  .wrap{max-width:960px;margin:0 auto;padding:0 24px}
  .eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  a{color:var(--signal)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input[type=text]{font-family:inherit}
  .focusable:focus-visible{outline:2px solid var(--signal);outline-offset:2px;border-radius:4px}
  hr{border:none;border-top:1px solid var(--line);margin:0}
  ::selection{background:var(--signal);color:var(--bg)}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
  .scan{animation:scan .62s cubic-bezier(.5,0,.2,1)}
  @keyframes scan{0%{transform:translateX(0);opacity:0}10%{opacity:1}100%{transform:translateX(108px);opacity:0}}
  .lift{transition:transform .14s ease, border-color .14s ease}
  .lift:hover{transform:translateY(-2px)}
  .sw:hover{filter:brightness(1.08)}
  .chip{transition:background .12s ease,color .12s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useMemo,useRef,useEffect} = React;

const ROLES = ["bg","panel","line","text","muted","signal","accent","warn"];
const ROLE_LABEL = {bg:"bakgrunn",panel:"flate",line:"linje",text:"tekst",muted:"dempet",signal:"signal",accent:"aksent",warn:"varsel"};

const PALETTES = [
  {id:"dyp", name:"Dypvann", note:"timene under overflaten (Subnautica)",
   c:{bg:"#07141C",panel:"#0C1F2A",line:"#16323F",text:"#DDEFF2",muted:"#6E8B95",signal:"#2FE6D6",accent:"#18A7C4",warn:"#FF7A3C"}},
  {id:"aske", name:"Aske", note:"tåke, bark og ett glør fra essa (Valheim)",
   c:{bg:"#15191A",panel:"#1E2426",line:"#2E3739",text:"#E7E3D6",muted:"#8A9590",signal:"#E2502A",accent:"#9FB1A6",warn:"#E2A23A"}},
  {id:"voice", name:"Voice", note:"fargen kanalen lyser i når noen snakker",
   c:{bg:"#1B1D24",panel:"#24262E",line:"#33353F",text:"#E9EAF0",muted:"#8A8D9A",signal:"#3DDC97",accent:"#6B74F0",warn:"#F0A93B"}},
  {id:"natt", name:"Natt", note:"deepslate og én gnist glowstone (Minecraft)",
   c:{bg:"#0F1116",panel:"#181B22",line:"#262A33",text:"#E6E8EC",muted:"#7C828E",signal:"#F4B740",accent:"#4FA3D1",warn:"#E2502A"}},
  {id:"mono", name:"Mono +1", note:"disiplin: nesten-svart, bein, og én farge dere eier",
   c:{bg:"#101012",panel:"#181819",line:"#2A2A2C",text:"#ECEAE4",muted:"#7E7C78",signal:"#F24B3D",accent:"#F24B3D",warn:"#E0B23A"}},
];

// ---- the signature: the haum pulse ----
function Pulse({size=120,stroke=6,scanKey=0,scanning=false,color="var(--signal)",baseline=true}){
  const w=120,h=48;
  return (
    <svg width={size} height={size*h/w} viewBox={`0 0 ${w} ${h}`} fill="none" aria-hidden="true"
      style={{display:"block",overflow:"visible"}}>
      {baseline && <line x1="2" y1="30" x2="118" y2="30" stroke="var(--line)" strokeWidth="2"/>}
      <path d="M2,30 H24 Q38,4 52,30 H60 Q74,4 88,30 H118" stroke={color}
        strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"/>
      {scanning &&
        <circle key={scanKey} className="scan" cx="6" cy="30" r="4.5" fill={color}/>}
    </svg>
  );
}

function Ring({size=120}){
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" fill="none" aria-hidden="true">
      <circle cx="60" cy="60" r="8" fill="var(--signal)"/>
      <circle cx="60" cy="60" r="24" stroke="var(--signal)" strokeWidth="5" opacity="0.7"/>
      <circle cx="60" cy="60" r="42" stroke="var(--accent)" strokeWidth="4" opacity="0.4"/>
      <circle cx="60" cy="60" r="58" stroke="var(--accent)" strokeWidth="3" opacity="0.18"/>
    </svg>
  );
}

function Monogram({size=120}){
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" fill="none" aria-hidden="true">
      <rect x="20" y="22" width="12" height="76" rx="2" fill="var(--text)"/>
      <rect x="88" y="22" width="12" height="76" rx="2" fill="var(--text)"/>
      <path d="M32,60 H44 Q52,42 60,60 Q68,78 76,60 H88" stroke="var(--signal)"
        strokeWidth="9" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>
  );
}

function Mark({concept,size,scanKey,scanning}){
  if(concept==="ring") return <Ring size={size}/>;
  if(concept==="monogram") return <Monogram size={size}/>;
  return <Pulse size={size} scanKey={scanKey} scanning={scanning}/>;
}

// ---- wordmark ----
function Wordmark({style,scanKey,scanning}){
  const base={lineHeight:1,userSelect:"none"};
  if(style==="mono") return (
    <span className="mono" style={{...base,fontSize:"clamp(40px,9vw,76px)",fontWeight:700,letterSpacing:"-.02em",color:"var(--text)"}}>
      haum<span style={{color:"var(--signal)"}}>·</span>haum
    </span>);
  if(style==="pixel") return (
    <span style={{...base,fontFamily:'ui-monospace,monospace',fontSize:"clamp(38px,8.5vw,70px)",fontWeight:800,letterSpacing:".06em",color:"var(--text)",textShadow:"3px 3px 0 var(--accent)"}}>
      HAUM
    </span>);
  // geometric (default): tight lowercase + the pulse riding the baseline
  return (
    <span style={{...base,display:"inline-flex",alignItems:"flex-end",gap:"6px"}}>
      <span style={{fontSize:"clamp(46px,10vw,86px)",fontWeight:800,letterSpacing:"-.04em",color:"var(--text)"}}>haum</span>
      <span style={{marginBottom:"10px"}}><Pulse size={64} stroke={7} scanKey={scanKey} scanning={scanning} baseline={false}/></span>
    </span>);
}

// ---- mascot ----
function Mascot({active,size=150}){
  const mouth = active
    ? "M40,86 H52 Q62,66 72,86 Q82,106 92,86 H104"   // double pulse
    : "M44,90 H100";                                  // idle flat
  return (
    <svg width={size} height={size} viewBox="0 0 144 144" fill="none" aria-hidden="true">
      <rect x="14" y="14" width="116" height="116" rx="34" fill="var(--panel)" stroke="var(--line)" strokeWidth="3"/>
      <circle cx="52" cy="58" r={active?5.5:4} fill="var(--text)"/>
      <circle cx="92" cy="58" r={active?5.5:4} fill="var(--text)"/>
      <path d={mouth} stroke={active?"var(--signal)":"var(--muted)"} strokeWidth="7"
        strokeLinecap="round" strokeLinejoin="round" fill="none"
        style={{transition:"stroke .2s ease"}}/>
      {active && <line x1="44" y1="90" x2="100" y2="90" stroke="var(--line)" strokeWidth="2"/>}
    </svg>
  );
}

// ---- prefix machine ----
const DICT = {minecraft:"Haumcraft",valheim:"Haumheim",subnautica:"Haumnautica",
  discord:"Haumcord",factorio:"Haumtorio",terraria:"Haumraria",satisfactory:"Haumfactory"};
function haumify(raw){
  const w=(raw||"").trim();
  if(!w) return {out:"haum haum",guess:false};
  const key=w.toLowerCase();
  if(DICT[key]) return {out:DICT[key],guess:false};
  const vg=/[aeiouyæøåAEIOUYÆØÅ]+/g;
  let m,starts=[];
  while((m=vg.exec(w))!==null) starts.push(m.index);
  if(starts.length>=2){
    let cut=starts[1];
    while(cut>0 && /[^aeiouyæøåAEIOUYÆØÅ]/.test(w[cut-1])) cut--;
    return {out:"Haum"+w.slice(cut).toLowerCase(),guess:true};
  }
  return {out:"Haum-"+w.toLowerCase(),guess:true};
}

// ---- small ui helpers ----
function Eyebrow({children}){return <div className="eyebrow" style={{marginBottom:14}}>{children}</div>;}
function Section({label,children,top}){
  return (
    <section style={{padding:`${top?56:44}px 0`}}>
      <div className="wrap">
        <Eyebrow>{label}</Eyebrow>
        {children}
      </div>
    </section>
  );
}
function Toggle({options,value,onChange}){
  return (
    <div style={{display:"inline-flex",border:"1px solid var(--line)",borderRadius:10,padding:3,gap:3,flexWrap:"wrap"}}>
      {options.map(o=>(
        <button key={o.v} className="chip focusable" onClick={()=>onChange(o.v)}
          style={{padding:"7px 13px",borderRadius:7,fontSize:13,
            background:value===o.v?"var(--signal)":"transparent",
            color:value===o.v?"var(--bg)":"var(--muted)",fontWeight:value===o.v?600:400}}>
          {o.l}
        </button>
      ))}
    </div>
  );
}

function App(){
  const [palId,setPalId]=useState("dyp");
  const preset=PALETTES.find(p=>p.id===palId);
  const [colors,setColors]=useState(preset.c);
  const [wstyle,setWstyle]=useState("geo");
  const [concept,setConcept]=useState("pulse");
  const [mascot,setMascot]=useState(false);
  const [scanKey,setScanKey]=useState(0);
  const [scanning,setScanning]=useState(false);
  const [pfx,setPfx]=useState("Minecraft");
  const [copied,setCopied]=useState("");

  useEffect(()=>{ setColors(PALETTES.find(p=>p.id===palId).c); },[palId]);

  const rootStyle = useMemo(()=>{
    const s={}; ROLES.forEach(r=>s["--"+r]=colors[r]); return s;
  },[colors]);

  function haum(){
    setScanKey(k=>k+1); setScanning(true); setMascot(true);
    setTimeout(()=>setMascot(false),900);
  }
  function setColor(role,val){ setColors(c=>({...c,[role]:val})); }

  const cssExport = ":root{\n"+ROLES.map(r=>`  --haum-${r}: ${colors[r]};`).join("\n")+"\n}";
  const jsonExport = JSON.stringify(colors,null,2);
  function copy(txt,tag){ navigator.clipboard?.writeText(txt); setCopied(tag); setTimeout(()=>setCopied(""),1200); }

  const pf=haumify(pfx);

  return (
  <div style={{...rootStyle,background:"var(--bg)",color:"var(--text)",minHeight:"100vh",transition:"background .25s ease"}}>

    {/* hero */}
    <header style={{borderBottom:"1px solid var(--line)"}}>
      <div className="wrap" style={{padding:"22px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span className="eyebrow">haum · brand playground</span>
        <span className="eyebrow" style={{color:"var(--muted)"}}>est. ~2015 · 10 år</span>
      </div>
      <div className="wrap" style={{padding:"40px 24px 56px",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
          <Wordmark style={wstyle} scanKey={scanKey} scanning={scanning}/>
        </div>
        <p style={{maxWidth:520,margin:"0 auto 28px",color:"var(--muted)",fontSize:16}}>
          «haum haum» er lyden av at en haumie er til stede — et signal sagt idet noen kobler seg på.
          Hele identiteten henger på den ene pulsen.
        </p>
        <button onClick={haum} className="lift focusable"
          style={{border:"1px solid var(--signal)",color:"var(--signal)",background:"transparent",
            padding:"12px 26px",borderRadius:99,fontSize:15,fontWeight:600,letterSpacing:".02em"}}>
          haum ◂)) 
        </button>
        <div style={{display:"flex",justifyContent:"center",marginTop:34}}>
          <Mark concept={concept} size={120} scanKey={scanKey} scanning={scanning}/>
        </div>
      </div>
    </header>

    {/* palette */}
    <Section label="palett — hentet fra deres egen verden, ikke en generisk gamer-kombo" top>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
        {PALETTES.map(p=>(
          <button key={p.id} onClick={()=>setPalId(p.id)} className="lift focusable"
            style={{textAlign:"left",border:"1px solid",borderColor:palId===p.id?"var(--signal)":"var(--line)",
              background:"var(--panel)",borderRadius:12,padding:"12px 14px",minWidth:150,flex:"1 1 150px"}}>
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              {["bg","panel","signal","accent","warn"].map(r=>(
                <span key={r} style={{width:16,height:16,borderRadius:4,background:p.c[r],border:"1px solid rgba(255,255,255,.08)"}}/>
              ))}
            </div>
            <div style={{fontSize:14,fontWeight:600}}>{p.name}</div>
            <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{p.note}</div>
          </button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(104px,1fr))",gap:10,marginTop:18}}>
        {ROLES.map(r=>(
          <div key={r} style={{border:"1px solid var(--line)",borderRadius:10,overflow:"hidden",background:"var(--panel)"}}>
            <label style={{display:"block",height:54,background:colors[r],cursor:"pointer",position:"relative"}} className="sw">
              <input type="color" value={colors[r]} onChange={e=>setColor(r,e.target.value)}
                style={{opacity:0,width:"100%",height:"100%",cursor:"pointer"}} aria-label={ROLE_LABEL[r]}/>
            </label>
            <div style={{padding:"7px 9px"}}>
              <div style={{fontSize:11,color:"var(--muted)"}}>{ROLE_LABEL[r]}</div>
              <div className="mono" style={{fontSize:12}}>{colors[r].toUpperCase()}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:18}}>
        <button onClick={()=>copy(cssExport,"css")} className="focusable"
          style={{border:"1px solid var(--line)",borderRadius:8,padding:"9px 16px",fontSize:13,color:"var(--text)"}}>
          {copied==="css"?"kopiert ✓":"kopier CSS-variabler"}
        </button>
        <button onClick={()=>copy(jsonExport,"json")} className="focusable"
          style={{border:"1px solid var(--line)",borderRadius:8,padding:"9px 16px",fontSize:13,color:"var(--text)"}}>
          {copied==="json"?"kopiert ✓":"kopier JSON (tokens)"}
        </button>
        <span style={{fontSize:12,color:"var(--muted)",alignSelf:"center"}}>
          → samme tokens kan drive UI-et på server-plattformen
        </span>
      </div>
    </Section>

    <div className="wrap"><hr/></div>

    {/* logo lab */}
    <Section label="logo-lab — sammenlign retninger live (de gamle Habbo-vibba er borte)">
      <div style={{display:"flex",gap:24,flexWrap:"wrap",marginBottom:24}}>
        <div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>ordmerke</div>
          <Toggle value={wstyle} onChange={setWstyle} options={[
            {v:"geo",l:"geometrisk"},{v:"mono",l:"terminal"},{v:"pixel",l:"pixel (flat)"}]}/>
        </div>
        <div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>merke</div>
          <Toggle value={concept} onChange={setConcept} options={[
            {v:"pulse",l:"puls"},{v:"monogram",l:"h-monogram"},{v:"ring",l:"presence-ring"}]}/>
        </div>
      </div>
      <div style={{border:"1px solid var(--line)",borderRadius:16,background:"var(--panel)",
        padding:"48px 24px",display:"flex",flexWrap:"wrap",gap:48,alignItems:"center",justifyContent:"center"}}>
        <Wordmark style={wstyle} scanKey={scanKey} scanning={scanning}/>
        <Mark concept={concept} size={104} scanKey={scanKey} scanning={scanning}/>
      </div>
      <p style={{fontSize:13,color:"var(--muted)",marginTop:14,maxWidth:620}}>
        h-monogrammet er favoritten min som emblem: en vanlig H der tverrstreken er pulsen.
        Leses som bokstav og som signal samtidig, og er like rent å bygge i Minecraft som å bruke som favicon.
      </p>
    </Section>

    <div className="wrap"><hr/></div>

    {/* mascot */}
    <Section label="maskot — med en grunn til å finnes">
      <div style={{display:"flex",gap:32,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{border:"1px solid var(--line)",borderRadius:16,background:"var(--panel)",padding:28,
          display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
          <Mascot active={mascot}/>
          <button onClick={()=>setMascot(m=>!m)} className="focusable"
            style={{border:"1px solid var(--line)",borderRadius:8,padding:"7px 16px",fontSize:13,color:"var(--text)"}}>
            {mascot?"idle":"haum"}
          </button>
        </div>
        <div style={{flex:"1 1 320px",minWidth:280}}>
          <p style={{marginBottom:14}}>
            Maskoten er <b>den som lager haumet</b>. Ansiktet er nesten bare en munn — og munnen
            er pulsen. Stille linje når den er idle, dobbel-puls i signal-fargen når en haumie joiner.
          </p>
          <p style={{color:"var(--muted)",fontSize:14}}>
            Derfor er den ikke bare pynt: den er en <b>online-/presence-indikator</b>. Samme glyph
            kan vise hvem som er på i Discord, lyse opp i et server-event på plattformen, eller stå
            som statue in-game. Den gjør én ekte jobb.
          </p>
        </div>
      </div>
    </Section>

    <div className="wrap"><hr/></div>

    {/* prefix */}
    <Section label="prefiks-maskin — regelen er smak, ikke matte">
      <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
        <input type="text" value={pfx} onChange={e=>setPfx(e.target.value)}
          className="focusable" placeholder="skriv et spill eller ord…"
          style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:10,
            padding:"12px 16px",fontSize:16,color:"var(--text)",minWidth:220}}/>
        <span style={{fontSize:24,color:"var(--muted)"}}>→</span>
        <span style={{fontSize:28,fontWeight:700}}>
          <span style={{color:"var(--signal)"}}>{pf.out.slice(0,4)}</span>{pf.out.slice(4)}
        </span>
        {pf.guess && <span className="mono" style={{fontSize:11,color:"var(--muted)",border:"1px solid var(--line)",borderRadius:6,padding:"3px 7px"}}>gjett · rediger fritt</span>}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:16}}>
        {["Minecraft","Valheim","Subnautica","Discord","Factorio"].map(x=>(
          <button key={x} onClick={()=>setPfx(x)} className="chip focusable"
            style={{border:"1px solid var(--line)",borderRadius:99,padding:"6px 13px",fontSize:13,color:"var(--muted)"}}>
            {x}
          </button>
        ))}
      </div>
    </Section>

    <footer style={{borderTop:"1px solid var(--line)",padding:"32px 0 56px"}}>
      <div className="wrap" style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <span style={{fontSize:13,color:"var(--muted)"}}>
          rediger JSX-en rett i <span className="mono">index.html</span> · ingen build · push = live på GitHub Pages
        </span>
        <span className="eyebrow">haum ◂))</span>
      </div>
    </footer>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
